schemaVersion: 2.3.0
attributes:
  controller.devfile.io/storage-type: per-workspace
metadata:
  name: ansible-devspaces
dependentProjects:
- name: custom-collection
  git:
    checkoutFrom:
      remote: origin
      revision: main
    remotes:
      origin: git@github.com:kamlendu1982/dependent-collection-prj-smbc-devspaces.git
- name: development-project 
  git:
    checkoutFrom:
      remote: origin
      revision: main
    remotes:
      origin: git@github.com:kamlendu1982/dependent-prj-smbc-devspaces.git
components:
  - name: dev-tools
    container:
      image: ghcr.io/ansible/ansible-devspaces:latest
      cpuLimit: 4000m
      cpuRequest: 250m
      memoryRequest: 128Mi
      memoryLimit: 8Gi
      env:
        - name: HOME
          value: "/projects"
        - name: VSCODE_DEFAULT_WORKSPACE
          value: "/projects/ansible-devspaces/.code-workspace"
        - name: "ADT_CONTAINER_ENGINE"
          value: "podman"
commands:
  - id: run-temp-script
    exec:
      component: runtime
      # Executes a script directly inside your new separate folder
      commandLine: "/bin/bash"
      workingDir: /projects/my-defrepo3
      group:
        kind: run
